<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Stable Particle Hand Gesture</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #video-container { position: absolute; bottom: 20px; right: 20px; width: 180px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.5); transform: scaleX(-1); z-index: 10; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px 4px #000; z-index: 100; }
        .hint { font-size: 0.9em; color: #ccc; margin-top: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <h2 id="status">Memuat AI...</h2>
    <p id="current-shape">Pola: Sphere</p>
    <div class="hint">
        • Pastikan Izin Kamera diberikan (Allow)<br>
        • Kepalkan tangan: Kumpulkan Energi<br>
        • Buka kepalan: <b>MELEDAK</b><br>
        • Geser tangan: Menggerakkan Objek
    </div>
</div>
<video id="input-video" style="display:none;" playsinline></video>
<canvas id="video-container"></canvas>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

const PARTICLE_COUNT = 6000;
let handLandmarker;
let video = document.getElementById("input-video");
const canvasElement = document.getElementById("video-container");

// --- THREE.JS SETUP ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.BufferGeometry();
const posArray = new Float32Array(PARTICLE_COUNT * 3);
const colorArray = new Float32Array(PARTICLE_COUNT * 3);

// Posisi awal acak
for(let i=0; i<PARTICLE_COUNT*3; i++) {
    posArray[i] = (Math.random() - 0.5) * 10;
    colorArray[i] = Math.random();
}

geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

const material = new THREE.PointsMaterial({
    size: 0.04,
    vertexColors: true,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});

const points = new THREE.Points(geometry, material);
scene.add(points);
camera.position.z = 12; // Mundurkan kamera sedikit agar objek terlihat jelas

// --- TEMPLATES ---
const templates = { sphere: [], heart: [], flower: [], saturn: [], fireworks: [] };
function generateShapes() {
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        // Sphere
        const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
        const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
        templates.sphere.push(3 * Math.cos(theta) * Math.sin(phi), 3 * Math.sin(theta) * Math.sin(phi), 3 * Math.cos(phi));

        // Heart
        const t = Math.random() * Math.PI * 2;
        const xH = 16 * Math.pow(Math.sin(t), 3);
        const yH = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        templates.heart.push(xH * 0.18, yH * 0.18, (Math.random() - 0.5) * 0.5);

        // Flower
        const angle = (i / PARTICLE_COUNT) * Math.PI * 20;
        const rF = 3.5 * Math.cos(5/2 * angle);
        templates.flower.push(rF * Math.cos(angle), rF * Math.sin(angle), (Math.random() - 0.5) * 0.2);

        // Saturn
        if (i < PARTICLE_COUNT * 0.5) {
            const sPhi = Math.acos(-1 + (2 * i) / (PARTICLE_COUNT * 0.5));
            const sTheta = Math.sqrt(PARTICLE_COUNT * 0.5 * Math.PI) * sPhi;
            templates.saturn.push(1.8 * Math.cos(sTheta) * Math.sin(sPhi), 1.8 * Math.sin(sTheta) * Math.sin(sPhi), 1.8 * Math.cos(sPhi));
        } else {
            const rS = 4 + Math.random() * 1.5;
            const aS = Math.random() * Math.PI * 2;
            templates.saturn.push(rS * Math.cos(aS), (Math.random() - 0.5) * 0.2, rS * Math.sin(aS));
        }

        // Fireworks
        const rBurst = 5 + Math.random() * 2;
        const thetaB = Math.random() * Math.PI * 2;
        const phiB = Math.random() * Math.PI;
        templates.fireworks.push(rBurst * Math.cos(thetaB) * Math.sin(phiB), rBurst * Math.sin(thetaB) * Math.sin(phiB), rBurst * Math.cos(phiB));
    }
}
generateShapes();

// --- STATE ---
let currentTemplate = 'sphere';
let isFist = false;
let explosionStrength = 0;
let smoothHandPos = new THREE.Vector3(0, 0, 0);

async function initHandTracking() {
    try {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task` },
            runningMode: "VIDEO", numHands: 1
        });
        
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.play();
        document.getElementById('status').innerText = "Kamera Aktif";
        predict();
    } catch (err) {
        document.getElementById('status').innerText = "Gagal Akses Kamera!";
        console.error(err);
    }
}

function predict() {
    if (handLandmarker) {
        const results = handLandmarker.detectForVideo(video, performance.now());
        if (results.landmarks && results.landmarks.length > 0) {
            const hand = results.landmarks[0];
            
            // Pergerakan
            const targetX = -(hand[9].x - 0.5) * 25;
            const targetY = -(hand[9].y - 0.5) * 25;
            smoothHandPos.x += (targetX - smoothHandPos.x) * 0.1;
            smoothHandPos.y += (targetY - smoothHandPos.y) * 0.1;
            points.position.set(smoothHandPos.x, smoothHandPos.y, 0);

            // Deteksi Kepalan
            const dist = (p1, p2) => Math.sqrt((p1.x-p2.x)**2 + (p1.y-p2.y)**2);
            const avgDist = (dist(hand[8], hand[0]) + dist(hand[12], hand[0]) + dist(hand[16], hand[0]) + dist(hand[20], hand[0])) / 4;
            
            const wasFist = isFist;
            isFist = avgDist < 0.13;

            if (wasFist && !isFist) {
                explosionStrength = 1.5;
                const shapes = ['sphere', 'heart', 'flower', 'saturn', 'fireworks'];
                currentTemplate = shapes[Math.floor(Math.random() * shapes.length)];
                document.getElementById('current-shape').innerText = `Pola: ${currentTemplate.toUpperCase()}`;
            }

            // Warna berdasarkan posisi jari telunjuk
            const colorAttr = geometry.attributes.color;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                colorAttr.setXYZ(i, hand[8].x, 0.5, 1 - hand[8].x);
            }
            colorAttr.needsUpdate = true;
        }
    }
    requestAnimationFrame(predict);
}

function animate() {
    requestAnimationFrame(animate);
    const posAttr = geometry.attributes.position;
    const targetArray = templates[currentTemplate];
    
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;

        if (isFist) {
            posAttr.array[ix] *= 0.8;
            posAttr.array[iy] *= 0.8;
            posAttr.array[iz] *= 0.8;
        } else {
            let tx = targetArray[ix];
            let ty = targetArray[iy];
            let tz = targetArray[iz];

            if (explosionStrength > 0.05) {
                posAttr.array[ix] += (Math.random() - 0.5) * explosionStrength * 8;
                posAttr.array[iy] += (Math.random() - 0.5) * explosionStrength * 8;
                posAttr.array[iz] += (Math.random() - 0.5) * explosionStrength * 8;
            }

            posAttr.array[ix] += (tx - posAttr.array[ix]) * 0.08;
            posAttr.array[iy] += (ty - posAttr.array[iy]) * 0.08;
            posAttr.array[iz] += (tz - posAttr.array[iz]) * 0.08;
        }
    }
    
    if (explosionStrength > 0) explosionStrength *= 0.9;
    posAttr.needsUpdate = true;
    points.rotation.y += 0.003;
    renderer.render(scene, camera);
}

initHandTracking();
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
